<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Realistic 3D Button</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ultra-Realistic 3D Button</h1>
            <p>Interactive translucent glass button with realistic physics</p>
        </div>
        
        <div class="canvas-container">
            <canvas id="buttonCanvas" width="1200" height="800"></canvas>
            <div class="instructions">
                <p>Click and drag to interact with the button</p>
                <p>Press harder for more dramatic deformation</p>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="refractionSlider">Refraction Index:</label>
                <input type="range" id="refractionSlider" min="1.0" max="2.0" step="0.01" value="1.33">
                <span id="refractionValue">1.33</span>
            </div>
            <div class="control-group">
                <label for="transparencySlider">Transparency:</label>
                <input type="range" id="transparencySlider" min="0.1" max="1.0" step="0.01" value="0.8">
                <span id="transparencyValue">0.8</span>
            </div>
            <div class="control-group">
                <label for="elasticitySlider">Elasticity:</label>
                <input type="range" id="elasticitySlider" min="0.1" max="2.0" step="0.01" value="1.0">
                <span id="elasticityValue">1.0</span>
            </div>
        </div>
    </div>
    
    <script src="button3D.js"></script>
</body>
</html>
