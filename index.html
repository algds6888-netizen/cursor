<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão 3D Liquid Glass com Efeito Gelatina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="button-3d-container">
            <button class="button-3d" id="liquidButton">
                <div class="button-content">
                    <span class="button-text">Liquid Glass 3D</span>
                    <div class="liquid-overlay"></div>
                    <div class="glass-reflection"></div>
                    <div class="depth-shadow"></div>
                </div>
                <div class="button-background"></div>
                <div class="button-glow"></div>
            </button>
        </div>
        
        <div class="info">
            <h1>Botão 3D Liquid Glass</h1>
            <p>Inspirado no design da Apple com efeito de gelatina</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
